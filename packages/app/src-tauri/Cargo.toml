[package]
name = "clawssify-app"
version = "0.1.0"
edition = "2021"

[lib]
name = "clawssify_app_lib"
crate-type = ["lib", "staticlib", "cdylib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api"] }
window-vibrancy = "0.6"
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clawssify-core = { path = "../../core" }
dirs-next = "2"
